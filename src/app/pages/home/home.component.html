<main class="login-container" [class.dark-theme]="isDarkMode">

  <button class="theme-toggle-btn" (click)="toggleTheme()">
    <lucide-icon [name]="isDarkMode ? 'sun' : 'moon'" size="20">
    </lucide-icon>
  </button>

  <section class="form-section">

    <div class="logo-container">
      <img src="/assets/icons/logo-carriola.png" alt="Logo Asi & Obra" />
    </div>

    <h1 class="welcome-title">
      Bem vindo ao <br>
      <span class="brand-name">Asi & Obra!</span>
    </h1>

    <form class="login-form" (ngSubmit)="fazerLogin()">

      <div class="input-group">
        <input type="email" name="email" placeholder="Insira seu e-mail" [(ngModel)]="email" required>
        <img src="assets/icons/email.png" alt="Ícone de E-mail" class="input-icon">
      </div>

      <div class="input-group">
        <input type="password" name="senha" placeholder="Digite sua Senha" [(ngModel)]="senha" required>
        <img src="assets/icons/cadeado.png" alt="Ícone de Senha" class="input-icon">
      </div>

      <div class="actions-group">
        <button type="submit" class="btn-primary">Login</button>

        <button type="button" class="btn-secondary" (click)="irParaCadastro()">
          Cadastrar
        </button>
      </div>

      <a class="forgot-password" (click)="irParaEsqueceuSenha()" style="cursor: pointer;">
        Esqueci minha senha
      </a>

      <p *ngIf="erro" class="error-message">
        {{ erro }}
      </p>

    </form>
  </section>

  <section class="image-section">
    <div class="brick-background"></div>
  </section>

</main>
