<div class="login-container">
    <div class="login-card">

        <h1>🏗️ Sistema Material de Construção</h1>
        <p>Faça login para continuar</p>

        <form (ngSubmit)="fazerLogin()">

            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" [(ngModel)]="senha" name="senha" required>
            </div>

            <button type="submit">Entrar</button>

            <p *ngIf="erro" style="color: red; margin-top: 10px;">
                {{ erro }}
            </p>

        </form>

        <div class="cadastro-link">
            <p>Não tem conta?</p>
            <button class="outline" (click)="irParaCadastro()">Cadastrar</button>
        </div>

    </div>
</div>
