<main class="auth-container" [class.dark-theme]="isDarkMode">

  <button type="button" class="theme-toggle-btn" (click)="toggleTheme()" aria-label="Alternar tema">
    <lucide-icon [name]="isDarkMode ? 'sun' : 'moon'" size="20"></lucide-icon>
  </button>

  <section class="form-section">

    <div class="logo-container">
      <img src="assets/icons/logo-carriola.png" alt="Logo Asi & Obra" />
    </div>

    <h1 class="welcome-title">
      Bem vindo ao <br>
      <span class="brand-name">Asi & Obra!</span>
    </h1>

    <form class="auth-form" (ngSubmit)="fazerLogin()">

      <div class="input-group">
        <input type="email" name="email" placeholder="Insira seu e-mail" [(ngModel)]="email" required>
        <img src="assets/icons/email.png" alt="Ícone de E-mail" class="input-icon">
      </div>

      <div class="input-group">
  <input [type]="hidePassword ? 'password' : 'text'" name="senha" 
    placeholder="Digite sua Senha" 
    [(ngModel)]="password" 
    required>
  
  <button type="button" class="toggle-password-btn"
    (click)="hidePassword = !hidePassword" aria-label="hidePassword ? 'Mostrar senha' : 'Ocultar senha'">
    <lucide-icon [name]="hidePassword ? 'eye-off' : 'eye'" size="18"></lucide-icon>
  </button>


  <img src="assets/icons/cadeado.png" alt="Ícone de Senha" class="input-icon">
</div>

      <div class="actions-group">
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Entrando...' : 'Login' }}
        </button>

        <button type="button" class="btn-secondary" (click)="irParaCadastro()" [disabled]="loading">
          Cadastrar
        </button>
      </div>

      <a class="forgot-password" (click)="irParaEsqueceuSenha()" role="button" translate="no">
        Esqueci minha senha
      </a>

    </form>
  </section>

  <section class="image-section" aria-hidden="true">
    <div class="brick-background"></div>
  </section>

  <div class="overlay" *ngIf="erro" (click)="fecharAviso()"></div>
  
  <div class="error-message" *ngIf="erro" role="alert">
    <p>{{ erro }}</p>
    <button type="button" class="close-btn" (click)="fecharAviso()">Ok, entendi</button>
  </div>

</main>
