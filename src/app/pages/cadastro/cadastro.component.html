<main class="auth-container" [class.dark-theme]="isDarkMode">

  <button class="theme-toggle-btn" (click)="toggleTheme()">
    <lucide-icon [name]="isDarkMode ? 'sun' : 'moon'" size="20"></lucide-icon>
  </button>

  <section class="form-section">
    
    <div class="logo-container">
      <img src="assets/icons/logo-carriola.png" alt="Logo Asi & Obra" />
    </div>

    <h1 class="welcome-title" style="font-weight: 700;">
      Cadastro
    </h1>

    <form class="auth-form" (ngSubmit)="cadastrar()">
      
      <div class="input-group">
        <input type="text" name="name" placeholder="Digite seu nome" [(ngModel)]="name" required>
        <img src="assets/icons/pessoa.png" alt="Ícone de Usuário" class="input-icon">
      </div>

      <div class="input-group">
        <input type="email" name="email" placeholder="Insira seu e-mail" [(ngModel)]="email" required>
        <img src="assets/icons/email.png" alt="Ícone de E-mail" class="input-icon">
      </div>

      <div class="input-group">
        <input type="password" name="password" placeholder="Digite sua Senha" [(ngModel)]="password" required>
        <img src="assets/icons/cadeado.png" alt="Ícone de Senha" class="input-icon">
      </div>

      <div class="input-group">
        <input type="password" name="confirmPassword" placeholder="Repita sua Senha" [(ngModel)]="confirmPassword" required>
        <img src="assets/icons/cadeado.png" alt="Ícone de Senha" class="input-icon">
      </div>

      <div class="actions-group">
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Carregando...' : 'Criar conta' }}
        </button>

        <div class="login-link-container">
          <span class="texto-normal">Já possui uma conta? </span>
          <a class="link-destaque" (click)="goToLogin()">Realize o login</a>
        </div>
        
      </div>
    </form>
  </section>

  <section class="image-section">
    <div class="brick-background"></div>
  </section>

  <div class="overlay" *ngIf="errorMessage" (click)="fecharAviso()"></div>
  <div class="error-message" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
    <button type="button" class="close-btn" (click)="fecharAviso()">Ok, entendi</button>
  </div>

  <div class="overlay" *ngIf="successMessage" (click)="fecharAviso()"></div>
  <div class="success-message" *ngIf="successMessage" style="background-color: #4CAF50;">
    <p>{{ successMessage }}</p>
    <button type="button" class="close-btn" (click)="fecharAviso()">Ok, entendi</button>
  </div>

</main>
